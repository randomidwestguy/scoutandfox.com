// ── Trampoline ────────────────────────────────────────
class Trampoline extends Entity{
  constructor(tx,ty){
    super(tx*TS+1,ty*TS+4,30,24);
    this.t=0;this.bounceT=0;
  }
  update(){this.t+=0.05;if(this.bounceT>0)this.bounceT--;}
  draw(camX,camY){
    const sx=this.wx-camX,sy=this.wy-camY;
    const sq=this.bounceT>0?Math.sin(this.bounceT/5)*4:0;
    // legs
    ctx.fillStyle='#606060';
    ctx.fillRect(sx+3,sy+14+sq,4,10-sq);ctx.fillRect(sx+23,sy+14+sq,4,10-sq);
    // base feet
    ctx.fillRect(sx+1,sy+22,8,3);ctx.fillRect(sx+21,sy+22,8,3);
    // springs
    ctx.fillStyle='#a0a0a0';
    for(let i=0;i<5;i++)ctx.fillRect(sx+4+i*5,sy+10+sq,3,6-sq);
    // mat
    ctx.fillStyle='#E8205A';ctx.fillRect(sx+2,sy+6+sq,26,6-sq);
    ctx.fillStyle='#FF4080';ctx.fillRect(sx+2,sy+6+sq,26,2);
    // stars on mat
    ctx.fillStyle='#FFD060';ctx.font=`bold 8px ${F}`;ctx.textAlign='center';
    ctx.fillText('★',sx+8,sy+11+sq);ctx.fillText('★',sx+22,sy+11+sq);
    // label
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font=`500 7px ${F}`;
    ctx.fillText('Z',sx+15,sy+1);
  }
}

// ── Music & SFX ───────────────────────────────────────
const Music=(()=>{
  let ctx,master,muted=false,nextTime=0,loopId=null;
  const BPS=108/60, b=1/BPS;
  const N={
    C3:130.81,F3:174.61,G3:196.00,A3:220.00,
    C4:261.63,E4:329.63,G4:392.00,A4:440.00,
    C5:523.25,D5:587.33,E5:659.25,G5:783.99,A5:880.00
  };
  function n(freq,t,dur,vol,wave){
    if(!ctx||muted||!freq)return;
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(master);o.type=wave||'square';o.frequency.value=freq;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||0.12,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur*0.82);o.start(t);o.stop(t+dur);
  }
  // Main melody — cozy adventure loop
  const MEL=[
    [N.E5,.5],[N.G5,.5],[N.A5,1],[N.G5,.5],[N.E5,.5],
    [N.D5,1],[N.E5,.5],[N.G5,.5],[null,1],
    [N.G5,.5],[N.A5,.5],[N.G5,1],[N.E5,.5],[N.D5,.5],
    [N.C5,2],[null,2],
    [N.E5,.5],[N.D5,.5],[N.E5,.5],[N.G5,.5],[N.A5,1],[null,1],
    [N.G5,.5],[N.E5,.5],[N.D5,1],[N.C5,.5],[N.D5,.5],
    [N.E5,1],[N.G5,.5],[N.A5,.5],[N.G5,1],[N.E5,1],
    [N.C5,3],[null,1],
  ];
  const BASS=[
    [N.C3,4],[N.G3,4],[N.F3,4],[N.C3,4],
    [N.C3,4],[N.A3,2],[N.G3,2],[N.C3,4],
  ];
  const HARM=[
    [N.C4,4],[N.G4,4],[N.A4,4],[N.C4,4],
    [N.C4,4],[N.A4,4],[N.G4,4],[N.C4,4],
  ];
  function loop(){
    if(!ctx||muted)return;
    const t=Math.max(ctx.currentTime+0.05,nextTime);
    let mt=t,bt=t,ht=t,beats=0;
    for(const[freq,dur]of MEL){n(freq,mt,dur*b,0.10,'square');mt+=dur*b;beats+=dur;}
    for(const[freq,dur]of BASS)n(freq,bt,dur*b,0.14,'sine'),bt+=dur*b;
    for(const[freq,dur]of HARM)n(freq,ht,dur*b,0.06,'triangle'),ht+=dur*b;
    nextTime=t+beats*b;
    loopId=setTimeout(loop,(beats*b-0.25)*1000);
  }
  return{
    start(){
      if(ctx)return;
      try{ctx=new(window.AudioContext||window.webkitAudioContext)();
        master=ctx.createGain();master.gain.value=0.28;master.connect(ctx.destination);
        loop();
      }catch(e){}
    },
    toggle(){
      muted=!muted;
      if(master)master.gain.setTargetAtTime(muted?0:0.28,ctx.currentTime,0.08);
      if(!muted){nextTime=0;loop();}
      return muted;
    },
    get muted(){return muted;},
    sfx:{
      collect(){
        if(!ctx||muted)return;
        [523,659,784,1047].forEach((f,i)=>{
          const o=ctx.createOscillator(),g=ctx.createGain();
          o.connect(g);g.connect(master);o.type='square';o.frequency.value=f;
          const t=ctx.currentTime+i*0.055;
          g.gain.setValueAtTime(0.14,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
          o.start(t);o.stop(t+0.12);
        });
      },
      hit(){
        if(!ctx||muted)return;
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(master);o.type='sawtooth';
        o.frequency.setValueAtTime(120,ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(40,ctx.currentTime+0.12);
        g.gain.setValueAtTime(0.2,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);
        o.start();o.stop(ctx.currentTime+0.15);
      },
      dadFound(){
        if(!ctx||muted)return;
        [523,659,784,1047,1319,1568].forEach((f,i)=>{
          const o=ctx.createOscillator(),g=ctx.createGain();
          o.connect(g);g.connect(master);o.type='square';o.frequency.value=f;
          const t=ctx.currentTime+i*0.09;
          g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
          o.start(t);o.stop(t+0.5);
        });
      },
      pickup(){
        if(!ctx||muted)return;
        // Funny "bwoop" pickup sound - rising wobble
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(master);o.type='square';
        o.frequency.setValueAtTime(180,ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(420,ctx.currentTime+0.1);
        o.frequency.exponentialRampToValueAtTime(340,ctx.currentTime+0.18);
        g.gain.setValueAtTime(0.15,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.22);
        o.start();o.stop(ctx.currentTime+0.22);
      },
      throw(){
        if(!ctx||muted)return;
        // Funny "FWOOMP" throw - whoosh down + splat
        [[0,600,80,0.08,'sawtooth'],[0.06,400,60,0.06,'sawtooth'],
         [0.12,200,40,0.08,'square'],[0.18,100,30,0.12,'square'],
         [0.28,880,20,0.06,'sine'],[0.34,440,15,0.08,'sine']].forEach(([t,f,vol,dur,type])=>{
          const o=ctx.createOscillator(),g=ctx.createGain();
          o.connect(g);g.connect(master);o.type=type;o.frequency.value=f;
          g.gain.setValueAtTime(vol/100,ctx.currentTime+t);
          g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+dur);
          o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+dur+0.02);
        });
      },
      happyWoof(){
        if(!ctx||muted)return;
        // Two bright cheerful barks - high and warm, not harsh
        [[0, 520, 0.18, 0.18],
         [0.22, 620, 0.16, 0.16]].forEach(([delay, freq, vol, dur])=>{
          const o=ctx.createOscillator(),g=ctx.createGain(),filter=ctx.createBiquadFilter();
          filter.type='bandpass';filter.frequency.value=600;filter.Q.value=1.5;
          o.connect(filter);filter.connect(g);g.connect(master);
          o.type='sine';
          o.frequency.setValueAtTime(freq,ctx.currentTime+delay);
          o.frequency.exponentialRampToValueAtTime(freq*1.3,ctx.currentTime+delay+0.06);
          o.frequency.exponentialRampToValueAtTime(freq*0.8,ctx.currentTime+delay+dur);
          g.gain.setValueAtTime(0,ctx.currentTime+delay);
          g.gain.linearRampToValueAtTime(vol,ctx.currentTime+delay+0.03);
          g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+dur);
          o.start(ctx.currentTime+delay);o.stop(ctx.currentTime+delay+dur+0.05);
        });
        // Happy little tail-wag chime after
        const o2=ctx.createOscillator(),g2=ctx.createGain();
        o2.connect(g2);g2.connect(master);o2.type='sine';o2.frequency.value=880;
        g2.gain.setValueAtTime(0.08,ctx.currentTime+0.42);
        g2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.62);
        o2.start(ctx.currentTime+0.42);o2.stop(ctx.currentTime+0.62);
      },
      defeat(){
        if(!ctx||muted)return;
        [523,440,349].forEach((f,i)=>{
          const o=ctx.createOscillator(),g=ctx.createGain();
          o.connect(g);g.connect(master);o.type='square';o.frequency.value=f;
          const t=ctx.currentTime+i*0.09;
          g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.14);
          o.start(t);o.stop(t+0.14);
        });
      },
      robertGarbins(){
        if(!ctx)return; // ignores mute — robert is LOUD
        const vol=master.gain.value;
        master.gain.setValueAtTime(0.7,ctx.currentTime); // temporary boost
        // "RO-BERT GAR-BINS" — four punchy notes + buzzy robot chord
        const notes=[
          {f:220,t:0,   dur:0.12,type:'sawtooth'},
          {f:330,t:0.13,dur:0.12,type:'sawtooth'},
          {f:180,t:0.28,dur:0.10,type:'sawtooth'},
          {f:260,t:0.38,dur:0.16,type:'sawtooth'},
          // robot buzz underneath
          {f:80, t:0,   dur:0.55,type:'square'},
          {f:110,t:0,   dur:0.55,type:'square'},
        ];
        notes.forEach(({f,t,dur,type})=>{
          const o=ctx.createOscillator(),g=ctx.createGain();
          o.connect(g);g.connect(master);o.type=type;o.frequency.value=f;
          const at=ctx.currentTime+t;
          g.gain.setValueAtTime(type==='square'?0.25:0.55,at);
          g.gain.exponentialRampToValueAtTime(0.001,at+dur);
          o.start(at);o.stop(at+dur+0.05);
        });
        // Final triumphant beep
        const ob=ctx.createOscillator(),gb=ctx.createGain();
        ob.connect(gb);gb.connect(master);ob.type='square';ob.frequency.value=880;
        gb.gain.setValueAtTime(0.4,ctx.currentTime+0.56);
        gb.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.85);
        ob.start(ctx.currentTime+0.56);ob.stop(ctx.currentTime+0.85);
        // Restore volume
        master.gain.setTargetAtTime(vol,ctx.currentTime+0.9,0.1);
      },
      chime(){
        if(!ctx||muted)return;
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(master);o.type='sine';o.frequency.value=880;
        g.gain.setValueAtTime(0.1,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
        o.start();o.stop(ctx.currentTime+0.3);
      },
      atk(){
        if(!ctx||muted)return;
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(master);o.type='square';
        o.frequency.setValueAtTime(320,ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(70,ctx.currentTime+0.1);
        g.gain.setValueAtTime(0.18,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);
        o.start();o.stop(ctx.currentTime+0.12);
      },
      jump(){
        if(!ctx||muted)return;
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(master);o.type='square';
        o.frequency.setValueAtTime(220,ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(520,ctx.currentTime+0.1);
        g.gain.setValueAtTime(0.1,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.14);
        o.start();o.stop(ctx.currentTime+0.14);
      },
      boing(){
        if(!ctx||muted)return;
        [180,360,540,360,180].forEach((f,i)=>{
          const o=ctx.createOscillator(),g=ctx.createGain();
          o.connect(g);g.connect(master);o.type='sine';o.frequency.value=f;
          const t=ctx.currentTime+i*0.07;
          g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
          o.start(t);o.stop(t+0.1);
        });
      }
    }
  };
})();

(function loop(){G.update();G.draw();requestAnimationFrame(loop);})();
